# ---------------------------------------------------------------------------
# Integration test harness (tests/helpers/service.go → testcontainers-go).
#
# Two services only:
#   anvil     — local EVM chain
#   deployer  — compiles + deploys the contracts, then serves addresses.env
#
# The harness reserves two random host ports before bringing the stack up
# and passes them in via:
#
#   ANVIL_PORT_RPC_HTTP  — host port bound to anvil's :8545
#   DEPLOYER_SERVER      — host port bound to deployer's :8888
#
# Build context is the repo root so the deployer image can reach
# solidity/ and testnet/deploy.sh without path gymnastics. The same
# Dockerfile powers the multi-node `testnet/` stack; we reuse it here so
# the integration harness and the testnet stay in sync.
# ---------------------------------------------------------------------------

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    entrypoint:
      - anvil
      - --host
      - "0.0.0.0"
      - --port
      - "8545"
      - --chain-id
      - "1337"
      - --accounts
      - "40"
      - --block-time
      - "2"
      - --hardfork
      - "cancun"
      - --disable-code-size-limit
    ports:
      - "${ANVIL_PORT_RPC_HTTP:-0}:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 30

  deployer:
    build:
      context: ../..
      dockerfile: testnet/Dockerfile.deployer
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      CHAIN_ID: "1337"
      RPC_URL: "http://anvil:8545"
      PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    ports:
      - "${DEPLOYER_SERVER:-0}:8888"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/addresses.env"]
      interval: 2s
      timeout: 5s
      retries: 60
