server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long cache on hashed Vite assets — they're content-addressed.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # /config.json is regenerated at every container start by entrypoint.sh,
  # so it must NOT be cached by browsers / proxies. Otherwise a chain
  # redeployment doesn't propagate to clients without a hard refresh.
  location = /config.json {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires off;
  }

  # SPA: anything that isn't a real file falls back to index.html so React
  # Router can handle it client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;
}
