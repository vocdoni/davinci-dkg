# ---------------------------------------------------------------------------
# davinci-dkg compose stack.
#
# Profiles:
#   - node  Long-running DKG node + Watchtower auto-updater. The node
#           binary does not serve any HTTP — all interaction with the
#           chain goes through --web3.rpc. Use the `ui` profile (or the
#           published UI image directly) to host an explorer.
#   - ui    Standalone UI container (nginx serving the static SPA on
#           :8082). Independent of the node service: use it to host a
#           public explorer that talks to whichever RPC you point it at,
#           with or without operating a node.
#   - test  Runs unit and integration tests inside a container (no GPU).
#
# For the multi-node local testnet (Anvil + deployer + N nodes + UI), see
# testnet/docker-compose.yml instead of this file.
# ---------------------------------------------------------------------------

x-common-env: &common-env
  DAVINCI_DKG_DATADIR: /app/run
  DAVINCI_DKG_ARTIFACTS_DIR: /app/run/artifacts

x-test-env: &test-env
  <<: *common-env
  LOG_LEVEL: debug
  CGO_ENABLED: "0"

services:
  # ──────────────────────────────────────────────────────────────────────────
  # DKG node
  # ──────────────────────────────────────────────────────────────────────────

  node:
    profiles: ["node"]
    build:
      context: ./
    image: "ghcr.io/vocdoni/davinci-dkg:${DAVINCI_DKG_TAG:-latest}"
    env_file: .env
    environment: *common-env
    volumes:
      - run:/app/run
      - ${HOME:-/root}/.davinci/artifacts:/app/run/artifacts
    restart: ${RESTART:-unless-stopped}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ──────────────────────────────────────────────────────────────────────────
  # Auto-updater — watches the image the `node` service is pinned to and
  # recreates the container when a new version is published. Remove this
  # service (or pin DAVINCI_DKG_TAG to an immutable tag) if you want to
  # control upgrades manually.
  # ──────────────────────────────────────────────────────────────────────────

  watchtower:
    profiles: ["node"]
    image: nickfedor/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --label-enable --include-stopped --revive-stopped
    restart: ${RESTART:-unless-stopped}
    depends_on:
      - node

  # ──────────────────────────────────────────────────────────────────────────
  # Standalone UI — Vite SPA built once in CI, served by nginx.
  #
  #   docker compose --profile ui  up                      → UI only
  #   docker compose --profile node --profile ui  up       → node + UI
  #
  # The UI is fully decoupled from the node — it talks to the chain
  # directly via RPC. All chain config is read at container start from env
  # vars; one image targets any deployment without a rebuild.
  #
  # Chain-selection knobs (set in .env, environment, or inline):
  #   RPC_URL          — JSON-RPC endpoint the browser will hit. Short
  #                      alias for DAVINCI_DKG_RPC_URL.
  #   MANAGER_ADDRESS  — DKGManager contract. Short alias for
  #                      DAVINCI_DKG_MANAGER_ADDRESS.
  #   CHAIN_ID         — EIP-155 chain id. Short alias for
  #                      DAVINCI_DKG_CHAIN_ID.
  #   CHAIN_NAME       — Display name. Short alias for
  #                      DAVINCI_DKG_CHAIN_NAME.
  #   REGISTRY_ADDRESS — Optional. DKGRegistry override.
  #   START_BLOCK      — Optional. Lower bound for getLogs scans.
  #
  # Either the short or the long form works; the long form takes precedence
  # if both are set so a node-side .env (which uses the DAVINCI_DKG_ prefix)
  # keeps controlling the UI image without surprise overrides from a stray
  # RPC_URL on the shell.
  #
  # Example:
  #   RPC_URL=http://host.docker.internal:8545 \
  #   MANAGER_ADDRESS=0xabc... CHAIN_ID=31337 CHAIN_NAME=anvil \
  #     docker compose --profile ui up
  # ──────────────────────────────────────────────────────────────────────────

  ui:
    profiles: ["ui"]
    build:
      context: ./
      dockerfile: ui/Dockerfile
    image: "ghcr.io/vocdoni/davinci-dkg-ui:${DAVINCI_DKG_UI_TAG:-latest}"
    env_file:
      - path: .env
        required: false
    environment:
      DAVINCI_DKG_RPC_URL: "${DAVINCI_DKG_RPC_URL:-${RPC_URL:-https://eth-sepolia.public.blastapi.io}}"
      DAVINCI_DKG_MANAGER_ADDRESS: "${DAVINCI_DKG_MANAGER_ADDRESS:-${MANAGER_ADDRESS:-0xd3ef727b695b21e108497c36f9dcec52d741298a}}"
      DAVINCI_DKG_CHAIN_ID: "${DAVINCI_DKG_CHAIN_ID:-${CHAIN_ID:-11155111}}"
      DAVINCI_DKG_CHAIN_NAME: "${DAVINCI_DKG_CHAIN_NAME:-${CHAIN_NAME:-sepolia}}"
      DAVINCI_DKG_REGISTRY_ADDRESS: "${DAVINCI_DKG_REGISTRY_ADDRESS:-${REGISTRY_ADDRESS:-}}"
      DAVINCI_DKG_START_BLOCK: "${DAVINCI_DKG_START_BLOCK:-${START_BLOCK:-}}"
    ports:
      - "${DAVINCI_DKG_UI_PORT:-8082}:80"
    restart: ${RESTART:-unless-stopped}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ──────────────────────────────────────────────────────────────────────────
  # Test services
  # ──────────────────────────────────────────────────────────────────────────

  unit-test:
    profiles: ["test"]
    build:
      context: ./
      dockerfile: Dockerfile
      target: builder
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME:-/root}/.davinci/artifacts:/app/run/artifacts
    network_mode: "host"
    environment:
      <<: *test-env
      RUN_INTEGRATION_TESTS: "false"
    command: /bin/sh -c "go test -v $$(go list ./... | grep -v github.com/vocdoni/davinci-dkg/tests) -timeout=1h"

  integration-test:
    profiles: ["test"]
    build:
      context: ./
      dockerfile: Dockerfile
      target: builder
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME:-/root}/.davinci/artifacts:/app/run/artifacts
    network_mode: "host"
    environment:
      <<: *test-env
      RUN_INTEGRATION_TESTS: "true"
    command: go test -v ./tests/... -timeout=2h

volumes:
  run:
    driver: local
