name: Build and Test

on:
  push:
    branches:
      - dev
      - stage
      - main
      - release**
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 1 * * *" # 02:00 UTC+1

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('{0}-push-{1}-{2}', github.workflow, github.ref, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Build the embedded webapp bundle once. Every Go job downloads the
  # artifact so that //go:embed all:dist in webapp/embed.go has files to
  # find — without this, `go vet`, `go build` and `go test` all fail on a
  # fresh checkout.
  # ---------------------------------------------------------------------------
  job_webapp:
    name: Webapp bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: webapp/pnpm-lock.yaml

      - name: Install webapp dependencies
        working-directory: webapp
        run: pnpm install --frozen-lockfile

      - name: Type-check
        working-directory: webapp
        run: pnpm run lint

      - name: Build webapp
        working-directory: webapp
        run: pnpm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-dist
          path: webapp/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Static analysis and formatting checks
  # ---------------------------------------------------------------------------
  job_go_checks:
    name: Go Checks
    needs: job_webapp
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download webapp dist
        uses: actions/download-artifact@v4
        with:
          name: webapp-dist
          path: webapp/dist/

      - name: Run go mod tidy
        run: |
          go mod tidy
          if [[ $(git status --porcelain) ]]; then
            git diff
            echo
            echo "go mod tidy made changes — run 'go mod tidy' and commit the result"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          diff=$(gofumpt -l .)
          if [[ -n "$diff" ]]; then
            echo "::error::gofumpt found unformatted files:"
            echo "$diff"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5

  # ---------------------------------------------------------------------------
  # Solidity contract tests
  # ---------------------------------------------------------------------------
  job_forge_test:
    name: Forge Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run forge build
        working-directory: solidity
        run: forge build

      - name: Run forge test
        working-directory: solidity
        run: forge test -vvv

  # ---------------------------------------------------------------------------
  # Go unit tests (no chain, no proofs — fast path)
  # ---------------------------------------------------------------------------
  job_go_unit_test:
    name: Go Unit Tests
    needs: job_webapp
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: debug
      RUN_INTEGRATION_TESTS: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download webapp dist
        uses: actions/download-artifact@v4
        with:
          name: webapp-dist
          path: webapp/dist/

      - name: Build all binaries
        run: go build ./cmd/...

      - name: Run unit tests
        run: |
          go test -v \
            $(go list ./... | grep -v github.com/vocdoni/davinci-dkg/tests) \
            -timeout=30m \
            -failfast

  # ---------------------------------------------------------------------------
  # Go integration tests (Anvil + Docker Compose deployer)
  # ---------------------------------------------------------------------------
  job_go_integration_test:
    name: Go Integration Tests
    needs: job_webapp
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: debug
      RUN_INTEGRATION_TESTS: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Foundry (for deployer container build)
        uses: foundry-rs/foundry-toolchain@v1

      - name: Download webapp dist
        uses: actions/download-artifact@v4
        with:
          name: webapp-dist
          path: webapp/dist/

      # Restore the circuit proving/verifying key cache keyed on the pinned
      # hashes in config/circuit_artifacts.go. This is the SAME cache that
      # go-test-circuits.yml populates on the circuits/** branch paths, so a
      # hash-stable run is expected to hit it. Without this step the Go
      # prover falls back to a local trusted setup whose verifying key does
      # not match the Solidity verifiers' baked-in vkey, and every
      # submitContribution reverts with ProofInvalid().
      - name: Restore circuit artifact cache
        uses: actions/cache@v4
        with:
          path: ~/.davinci/artifacts
          key: circuits-${{ hashFiles('config/circuit_artifacts.go') }}
          restore-keys: circuits-

      - name: Run integration tests
        if: github.event.pull_request.draft != true
        run: |
          go test -v ./tests/... \
            -timeout=2h \
            -failfast \
            -count=1

  # ---------------------------------------------------------------------------
  # Docker image build (calls reusable workflow). Only runs after all tests
  # are green, and only pushes on branch pushes (not PRs).
  # ---------------------------------------------------------------------------
  call-docker-build:
    name: Docker
    needs:
      - job_go_checks
      - job_forge_test
      - job_go_unit_test
      - job_go_integration_test
    permissions:
      contents: read
      packages: write
    if: github.event.pull_request.draft != true
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    with:
      image-tag: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
      push: ${{ github.event_name == 'push' }}
